# Mimir — single-binary mode for local development
# All components run in one process; data stored on local filesystem.
# Docs: https://grafana.com/docs/mimir/latest/references/configuration/

multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

# Use memberlist for all ring coordination (single node, no external KV needed)
memberlist:
  join_members: []

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks   # object storage (chunks) — must differ from tsdb dir
  tsdb:
    dir: /data/mimir/tsdb     # local TSDB WAL/head
  bucket_store:
    sync_dir: /data/mimir/tsdb-sync

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

usage_stats:
  enabled: false
