# Tempo — single-binary mode for local development
# Receives traces via OTLP and generates span metrics forwarded to Mimir.
# Docs: https://grafana.com/docs/tempo/latest/configuration/

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: warn

# Accept traces via OTLP (gRPC + HTTP) — the modern standard
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h  # Keep traces for 1 hour locally

# Local filesystem backend — no object storage needed for dev
storage:
  trace:
    backend: local
    local:
      path: /data/tempo/blocks
    wal:
      path: /data/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000

# Span metrics generator — derives RED metrics from traces and pushes to Mimir.
# This powers the "Service Graph" and "Span Metrics" features in Grafana.
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: local-dev
  storage:
    path: /data/tempo/generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true
  traces_storage:
    path: /data/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
      generate_native_histograms: both
